<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – QueueSmart</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .admin-wrapper {
            max-width: 1200px;
            margin: 40px auto;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .admin-header {
            padding: 32px 40px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .admin-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .admin-header p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .admin-content {
            padding: 40px;
            background: var(--bg);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, #1e40af 100%);
            padding: 24px;
            border-radius: var(--radius);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 30px 0 20px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .service-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: all var(--transition);
        }

        .service-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .service-card h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .service-info {
            margin: 16px 0;
        }

        .service-info p {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 8px 0;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.open {
            background: var(--success);
            color: white;
        }

        .status-badge.closed {
            background: var(--danger);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div class="admin-header">
            <h1>Welcome back, Admin</h1>
            <p>Manage your queues and services from one central dashboard</p>
        </div>
        
        <div class="admin-content">
            <!-- Stats Overview -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="statCustomersToday">—</div>
                    <div class="stat-label">Customers Today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statWaiting">0</div>
                    <div class="stat-label">Currently Waiting</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statServices">0</div>
                    <div class="stat-label">Active Services</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statAvgWait">—</div>
                    <div class="stat-label">Avg Wait (min)</div>
                </div>
            </div>

            <h2 class="section-title">Current Queues</h2>
            <p style="color: var(--text-secondary); margin: -10px 0 20px; font-size: 14px;">
                <a href="service-management.html">Manage services</a> · Data from the live queue API
            </p>

            <div class="services-grid" id="adminServicesGrid"></div>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script>
        (function () {
            var API = window.QS.api.getApiBase();

            function avgWaitMinutes(queueRows) {
                if (!queueRows.length) return null;
                var sum = 0;
                queueRows.forEach(function (r) {
                    var pos = parseInt(r.position, 10) || 1;
                    var dur = parseInt(r.expected_duration, 10) || 0;
                    sum += pos * dur;
                });
                return Math.round((sum / queueRows.length) * 10) / 10;
            }

            function render(services, queueRows) {
                var byService = {};
                queueRows.forEach(function (r) {
                    var sid = r.service_id;
                    if (!byService[sid]) byService[sid] = [];
                    byService[sid].push(r);
                });

                document.getElementById('statWaiting').textContent = String(queueRows.length);
                document.getElementById('statServices').textContent = String(services.length);
                var avg = avgWaitMinutes(queueRows);
                document.getElementById('statAvgWait').textContent = avg != null ? String(avg) : '—';

                var grid = document.getElementById('adminServicesGrid');
                if (!services.length) {
                    grid.innerHTML = '<p style="color:var(--text-muted);">No services in the database yet.</p>';
                    return;
                }

                grid.innerHTML = services.map(function (s) {
                    var sid = s.service_id;
                    var rows = byService[sid] || [];
                    var est = rows.length
                        ? Math.max.apply(null, rows.map(function (r) {
                            return (parseInt(r.position, 10) || 1) * (parseInt(r.expected_duration, 10) || 0);
                        }))
                        : null;
                    return (
                        '<div class="service-card">' +
                        '<h3>' + (s.service_name || '') + '</h3>' +
                        '<div class="service-info">' +
                        '<p>Queue Length: <strong>' + rows.length + ' waiting</strong></p>' +
                        '<p>Status: <span class="status-badge open">OPEN</span></p>' +
                        '<p>Est. Wait (last in line): <strong>' + (est != null ? est + ' min' : '—') + '</strong></p>' +
                        '</div>' +
                        '<div class="button-group">' +
                        '<button class="btn btn-primary" onclick="location.href=\'queue-management.html?service_id=' + sid + '\'">Manage queue</button>' +
                        '</div>' +
                        '</div>'
                    );
                }).join('');
            }

            Promise.all([
                fetch(API + '/services').then(function (r) { return r.json(); }),
                fetch(API + '/queue').then(function (r) { return r.json(); })
            ])
                .then(function (pair) {
                    var services = Array.isArray(pair[0]) ? pair[0] : [];
                    var queueRows = Array.isArray(pair[1]) ? pair[1] : [];
                    render(services, queueRows);
                })
                .catch(function () {
                    document.getElementById('adminServicesGrid').innerHTML =
                        '<p style="color:var(--danger);">Could not load dashboard data. Is the API running?</p>';
                });
        })();
    </script>
</body>
</html>

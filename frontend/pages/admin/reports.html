<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - QueueSmart</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .admin-wrapper {
            max-width: 1200px;
            margin: 40px auto;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            gap: 24px;
            padding: 32px 40px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .admin-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .admin-header p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .admin-content {
            padding: 40px;
            background: var(--bg);
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .reports-page .btn {
            width: auto;
            min-height: 42px;
        }

        .btn-outline {
            background: white;
            border: 1.5px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        .filter-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 24px;
            margin-bottom: 28px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(180px, 1fr)) auto;
            gap: 18px;
            align-items: end;
        }

        .form-control label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .report-input {
            width: 100%;
            min-height: 42px;
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: white;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .report-input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, #1e40af 100%);
            padding: 24px;
            border-radius: var(--radius);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            margin: 30px 0 18px;
        }

        .section-title h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .record-count {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
        }

        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 820px;
        }

        th {
            background: var(--primary-light);
            color: var(--text-primary);
            padding: 14px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 14px;
            vertical-align: top;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: var(--primary-light);
        }

        .customer-name {
            color: var(--text-primary);
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.served {
            background: #f0fdf4;
            color: var(--success);
        }

        .status-badge.canceled,
        .status-badge.cancelled {
            background: var(--danger-light);
            color: var(--danger);
        }

        .status-badge.waiting {
            background: var(--primary-light);
            color: var(--primary);
        }

        .status-badge.pending {
            background: #fffbeb;
            color: #d97706;
        }

        .empty-state {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 48px 24px;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state h2 {
            color: var(--text-primary);
            font-size: 18px;
            margin-bottom: 8px;
        }

        .alert {
            display: none;
            margin-bottom: 20px;
        }

        .alert.visible {
            display: flex;
        }

        @media (max-width: 900px) {
            .admin-wrapper {
                margin: 20px;
            }

            .admin-header {
                flex-direction: column;
                padding: 28px 24px;
            }

            .admin-content {
                padding: 24px;
            }

            .filter-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            .admin-wrapper {
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
            }

            .btn-row,
            .reports-page .btn {
                width: 100%;
            }

            .section-title {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body class="reports-page">
    <div class="admin-wrapper">
        <div class="admin-header">
            <div>
                <h1>Queue Activity Reports</h1>
                <p>Preview queue performance, filter activity, and export records for administrators.</p>
            </div>
            <div class="btn-row">
                <button class="btn btn-outline" onclick="location.href='admin-dashboard.html'">Back to Dashboard</button>
            </div>
        </div>

        <div class="admin-content">
            <div class="alert alert-error" id="reportError"></div>

            <div class="filter-panel">
                <div class="filter-grid">
                    <div class="form-control">
                        <label for="dateFrom">From Date</label>
                        <input class="report-input" type="date" id="dateFrom">
                    </div>
                    <div class="form-control">
                        <label for="dateTo">To Date</label>
                        <input class="report-input" type="date" id="dateTo">
                    </div>
                    <div class="form-control">
                        <label for="serviceFilter">Service</label>
                        <select class="report-input" id="serviceFilter">
                            <option value="">All Services</option>
                        </select>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-primary" onclick="previewReport()">Preview</button>
                        <button class="btn btn-outline" onclick="downloadCSV()">CSV</button>
                        <button class="btn btn-outline" onclick="downloadPDF()">PDF</button>
                    </div>
                </div>
            </div>

            <div id="statsSection" style="display: none;">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="statTotal">-</div>
                        <div class="stat-label">Total Entries</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statServed">-</div>
                        <div class="stat-label">Served</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statCanceled">-</div>
                        <div class="stat-label">Canceled</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statAvgWait">-</div>
                        <div class="stat-label">Avg Wait (min)</div>
                    </div>
                </div>
            </div>

            <div id="tableSection">
                <div class="empty-state">
                    <h2>No report preview yet</h2>
                    <p>Choose a date range or service, then preview the report.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';
        const currentUser = JSON.parse(sessionStorage.getItem('qs_user') || 'null');

        const isAdmin = currentUser && (currentUser.role === 'admin' || currentUser.role === 'administrator');
        if (!isAdmin) {
            window.location.href = '../auth/login.html';
        }

        function showError(message) {
            const error = document.getElementById('reportError');
            error.textContent = message;
            error.classList.add('visible');
        }

        function clearError() {
            const error = document.getElementById('reportError');
            error.textContent = '';
            error.classList.remove('visible');
        }

        function adminHeaders(extraHeaders = {}) {
            return {
                ...extraHeaders,
                'x-user-id': currentUser.id
            };
        }

        async function loadServices() {
            try {
                const res = await fetch(`${API}/services`);
                if (!res.ok) throw new Error('Unable to load services.');

                const data = await res.json();
                const services = Array.isArray(data) ? data : data.services || [];
                const select = document.getElementById('serviceFilter');

                services.forEach(service => {
                    const option = document.createElement('option');
                    option.value = service.service_id || service.id;
                    option.textContent = service.service_name || service.name;
                    select.appendChild(option);
                });
            } catch (error) {
                showError('Services could not be loaded. You can still preview reports for all services.');
            }
        }

        function buildQuery() {
            const params = new URLSearchParams();
            const from = document.getElementById('dateFrom').value;
            const to = document.getElementById('dateTo').value;
            const service = document.getElementById('serviceFilter').value;

            if (from) params.set('date_from', from);
            if (to) params.set('date_to', to);
            if (service) params.set('service_id', service);

            return params.toString();
        }

        function formatDate(value) {
            if (!value) return '-';
            return new Date(value).toLocaleString();
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function statusBadge(status) {
            const normalized = (status || 'pending').toLowerCase();
            return `<span class="status-badge ${escapeHtml(normalized)}">${escapeHtml(status || 'Pending')}</span>`;
        }

        function renderTable(rows) {
            if (!rows.length) {
                document.getElementById('tableSection').innerHTML = `
                    <div class="empty-state">
                        <h2>No records found</h2>
                        <p>Try broadening the date range or choosing all services.</p>
                    </div>
                `;
                return;
            }

            const tableRows = rows.map(row => `
                <tr>
                    <td>#${escapeHtml(row.entry_id)}</td>
                    <td>
                        <div class="customer-name">${escapeHtml(row.customer_name || '-')}</div>
                        <div>${escapeHtml(row.email || '-')}</div>
                    </td>
                    <td>${escapeHtml(row.service_name || '-')}</td>
                    <td>${escapeHtml(formatDate(row.join_time))}</td>
                    <td>${statusBadge(row.status)}</td>
                    <td>${escapeHtml(row.position ?? '-')}</td>
                </tr>
            `).join('');

            document.getElementById('tableSection').innerHTML = `
                <div class="section-title">
                    <h2>Entry Details</h2>
                    <span class="record-count">${rows.length} records</span>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Customer</th>
                                <th>Service</th>
                                <th>Join Time</th>
                                <th>Status</th>
                                <th>Position</th>
                            </tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                </div>
            `;
        }

        async function previewReport() {
            clearError();

            try {
                const res = await fetch(`${API}/reports/data?${buildQuery()}`, {
                    headers: adminHeaders()
                });
                if (!res.ok) throw new Error('Unable to generate report.');

                const data = await res.json();
                const stats = data.stats || {};
                const rows = Array.isArray(data.rows) ? data.rows : [];

                document.getElementById('statTotal').textContent = stats.total ?? 0;
                document.getElementById('statServed').textContent = stats.served ?? 0;
                document.getElementById('statCanceled').textContent = stats.canceled ?? 0;
                document.getElementById('statAvgWait').textContent = stats.avgWait ?? 0;
                document.getElementById('statsSection').style.display = '';

                renderTable(rows);
            } catch (error) {
                showError('Report preview could not be generated. Make sure the QueueSmart server is running.');
            }
        }

        async function downloadFile(format) {
            clearError();

            try {
                const res = await fetch(`${API}/reports/${format}?${buildQuery()}`, {
                    headers: adminHeaders()
                });
                if (!res.ok) throw new Error('Unable to download report.');

                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `queuesmart-report.${format}`;
                document.body.appendChild(link);
                link.click();
                link.remove();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                showError('Report export could not be downloaded. Make sure you are signed in as an admin.');
            }
        }

        function downloadCSV() {
            downloadFile('csv');
        }

        function downloadPDF() {
            downloadFile('pdf');
        }

        loadServices();
    </script>
</body>
</html>

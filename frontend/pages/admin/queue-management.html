<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Management – QueueSmart</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .admin-wrapper {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .admin-header {
            padding: 32px 40px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .admin-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .service-name {
            color: var(--primary);
            font-size: 16px;
            font-weight: 500;
        }

        .admin-content {
            padding: 40px;
            background: var(--bg);
        }

        .stats-mini {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-mini-card {
            background: var(--surface);
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-mini-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-mini-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .serve-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            width: 100%;
            margin-bottom: 30px;
        }

        .serve-btn:hover {
            background: #15803d;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(22,163,74,0.3);
        }

        .queue-list {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .queue-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            transition: background var(--transition);
        }

        .queue-item:last-child {
            border-bottom: none;
        }

        .queue-item:hover {
            background: var(--primary-light);
        }

        .customer-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .position-circle {
            width: 40px;
            height: 40px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
        }

        .customer-details h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .customer-details p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .wait-badge {
            background: var(--primary-light);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 16px;
        }

        .queue-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: white;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .icon-btn:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        .icon-btn.remove:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: var(--danger-light);
        }

        .icon-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-queue {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-queue p {
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div class="admin-header">
            <h1>Queue Management</h1>
            <span class="service-name" id="serviceName">Bank Teller</span>
        </div>
        
        <div class="admin-content">
           
            <div class="stats-mini">
                <div class="stat-mini-card">
                    <div class="stat-mini-value" id="totalInQueue">0</div>
                    <div class="stat-mini-label">In Queue</div>
                </div>
                <div class="stat-mini-card">
                    <div class="stat-mini-value" id="avgWaitTime">—</div>
                    <div class="stat-mini-label">Avg Wait (min)</div>
                </div>
                <div class="stat-mini-card">
                    <div class="stat-mini-value" id="servedToday">—</div>
                    <div class="stat-mini-label">Served Today</div>
                </div>
            </div>

            <p style="margin-bottom:16px;"><a href="admin-dashboard.html" style="color:var(--primary);font-weight:600;">← Back to dashboard</a></p>

            <!-- Serve Next Button -->
            <button class="serve-btn" type="button" id="serveNextBtn">
                ✅ Serve Next Customer
            </button>

            <!-- Queue List -->
            <div class="queue-list" id="queueList">
            </div>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script>
        (function () {
            var API = window.QS.api.getApiBase();
            var params = new URLSearchParams(window.location.search);
            var serviceIdFilter = params.get('service_id') || params.get('service');
            var queueRows = [];

            function waitMinutes(row) {
                var pos = parseInt(row.position, 10) || 1;
                var dur = parseInt(row.expected_duration, 10) || 0;
                return pos * dur;
            }

            function displayQueue() {
                var sorted = queueRows.slice().sort(function (a, b) {
                    return (parseInt(a.position, 10) || 0) - (parseInt(b.position, 10) || 0);
                });
                var html = '';
                if (!sorted.length) {
                    html = '<div class="empty-queue"><div style="font-size: 48px;">🎉</div><p>No customers waiting for this service.</p></div>';
                } else {
                    sorted.forEach(function (row, index) {
                        var name = row.customer_name || ('User #' + row.user_id);
                        var w = waitMinutes(row);
                        html +=
                            '<div class="queue-item">' +
                            '<div class="customer-info">' +
                            '<div class="position-circle">' + (index + 1) + '</div>' +
                            '<div class="customer-details">' +
                            '<h3>' + name + '</h3>' +
                            '<p>Entry #' + row.entry_id + ' · User #' + row.user_id + '</p>' +
                            '</div></div>' +
                            '<div style="display:flex;align-items:center;">' +
                            '<span class="wait-badge">⏱️ ' + w + ' min est.</span>' +
                            '</div></div>';
                    });
                }
                document.getElementById('queueList').innerHTML = html;
                document.getElementById('totalInQueue').textContent = String(sorted.length);
                if (!sorted.length) {
                    document.getElementById('avgWaitTime').textContent = '—';
                } else {
                    var sum = sorted.reduce(function (acc, r) { return acc + waitMinutes(r); }, 0);
                    document.getElementById('avgWaitTime').textContent = String(Math.round(sum / sorted.length));
                }
            }

            function loadQueue() {
                return fetch(API + '/queue')
                    .then(function (r) { return r.json(); })
                    .then(function (all) {
                        if (!Array.isArray(all)) all = [];
                        if (serviceIdFilter && !isNaN(parseInt(serviceIdFilter, 10))) {
                            var sid = parseInt(serviceIdFilter, 10);
                            queueRows = all.filter(function (row) { return parseInt(row.service_id, 10) === sid; });
                        } else {
                            queueRows = all;
                        }
                        displayQueue();
                    });
            }

            function loadServiceTitle() {
                if (!serviceIdFilter || isNaN(parseInt(serviceIdFilter, 10))) {
                    document.getElementById('serviceName').textContent = 'All services';
                    return;
                }
                fetch(API + '/services')
                    .then(function (r) { return r.json(); })
                    .then(function (services) {
                        var sid = parseInt(serviceIdFilter, 10);
                        var s = (services || []).find(function (x) { return parseInt(x.service_id, 10) === sid; });
                        document.getElementById('serviceName').textContent = s ? s.service_name : ('Service #' + sid);
                    })
                    .catch(function () {
                        document.getElementById('serviceName').textContent = 'Service #' + serviceIdFilter;
                    });
            }

            document.getElementById('serveNextBtn').addEventListener('click', function () {
                var body = {};
                if (serviceIdFilter && !isNaN(parseInt(serviceIdFilter, 10))) {
                    body.service_id = parseInt(serviceIdFilter, 10);
                }
                fetch(API + '/queue/serve-next', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                })
                    .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
                    .then(function (x) {
                        if (!x.ok) {
                            alert(x.d.message || 'Could not serve next.');
                            return;
                        }
                        var u = x.d.served && x.d.served.user_id;
                        alert('Served next customer (user #' + u + ').');
                        return loadQueue();
                    })
                    .catch(function () {
                        alert('Could not connect to server.');
                    });
            });

            loadServiceTitle();
            loadQueue().catch(function () {
                document.getElementById('queueList').innerHTML =
                    '<p style="color:var(--danger);padding:20px;">Could not load queue.</p>';
            });
        })();
    </script>
</body>
</html>

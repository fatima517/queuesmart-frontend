<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Management – QueueSmart</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;  
            padding: 40px 20px;        
            margin: 0;
            overflow-y: auto;          
        }
        
        .admin-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
            padding: 40px;
            margin: 20px auto;         
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        h2 {
            color: #333;
            font-size: 20px;
            margin: 40px 0 20px;       
        }
        
        h2:first-of-type {
            margin-top: 20px;
        }
        
        .form-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .required {
            color: #dc2626;
            margin-left: 2px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        
        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        
        .btn-primary:hover {
            background: #1d4ed8;
        }
        
        .table-container {
            overflow-x: auto;         
            border-radius: 12px;
            border: 1px solid #eee;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            min-width: 600px;            
        }
        
        th {
            background: #f8f9fa;
            color: #333;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #eee;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            color: #666;
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        .priority-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .priority-high {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .priority-medium {
            background: #fef3c7;
            color: #d97706;
        }
        
        .priority-low {
            background: #d1fae5;
            color: #16a34a;
        }
        
        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: white;
            color: #666;
            cursor: pointer;
            margin: 0 4px;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            border-color: #2563eb;
            color: #2563eb;
        }
        
        .action-btn.delete:hover {
            border-color: #dc2626;
            color: #dc2626;
        }
        
        .field-error {
            color: #dc2626;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .field-error.visible {
            display: block;
        }
        
        .field-hint {
            color: #666;
            font-size: 12px;
            margin-top: 4px;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 20px 10px;
            }
            
            .admin-card {
                padding: 20px;
            }
            
            .form-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-card">
        <h1>Service Management</h1>
        <p class="subtitle">Create and manage your queue services</p>
        
        <!-- Add New Service Form -->
        <div class="form-section">
            <h2 style="margin-top: 0;">Add New Service</h2>
            
            <form id="serviceForm">
                <div class="form-group">
                    <label>Service Name <span class="required">*</span></label>
                    <input type="text" id="serviceName" maxlength="50" placeholder="e.g., Bank Teller">
                    <span class="field-hint">Maximum 50 characters (API limit)</span>
                    <div class="field-error" id="nameError">Service name is required</div>
                </div>
                
                <div class="form-group">
                    <label>Description <span class="required">*</span></label>
                    <textarea id="description" rows="3" placeholder="Describe what this service offers..."></textarea>
                    <div class="field-error" id="descError">Description is required</div>
                </div>
                
                <div class="form-group">
                    <label>Expected Duration (minutes) <span class="required">*</span></label>
                    <input type="number" id="duration" min="1" placeholder="e.g., 15">
                    <div class="field-error" id="durationError">Please enter a valid duration</div>
                </div>
                
                <div class="form-group">
                    <label>Priority Level <span class="required">*</span></label>
                    <select id="priority">
                        <option value="">Select priority level</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                    <div class="field-error" id="priorityError">Please select a priority level</div>
                </div>
                
                <button type="submit" class="btn-primary">Create Service</button>
            </form>
        </div>
        
        <!-- Existing Services -->
        <h2>Existing Services</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Service Name</th>
                        <th>Description</th>
                        <th>Duration</th>
                        <th>Priority</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="servicesTableBody"></tbody>
            </table>
        </div>
        
        <div style="margin-top: 30px; text-align: right;">
            <button class="action-btn" onclick="location.href='admin-dashboard.html'" style="padding: 10px 20px;">← Back to Dashboard</button>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script>
        (function () {
            var API = window.QS.api.getApiBase();

            function priorityClass(level) {
                var l = (level || 'medium').toLowerCase();
                if (l === 'high') return 'priority-high';
                if (l === 'low') return 'priority-low';
                return 'priority-medium';
            }

            function renderTable(services) {
                var tbody = document.getElementById('servicesTableBody');
                if (!services.length) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#666;">No services yet. Create one above.</td></tr>';
                    return;
                }
                tbody.innerHTML = services.map(function (s) {
                    var badge = '<span class="priority-badge ' + priorityClass(s.priority_level) + '">' +
                        (s.priority_level || '').charAt(0).toUpperCase() + (s.priority_level || '').slice(1) + '</span>';
                    return (
                        '<tr>' +
                        '<td>' + (s.service_name || '') + '</td>' +
                        '<td>' + (s.description || '') + '</td>' +
                        '<td>' + (s.expected_duration != null ? s.expected_duration + ' min' : '—') + '</td>' +
                        '<td>' + badge + '</td>' +
                        '<td>' +
                        '<button type="button" class="action-btn" data-edit-id="' + s.service_id + '">Edit</button>' +
                        '</td></tr>'
                    );
                }).join('');

                tbody.querySelectorAll('[data-edit-id]').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var id = parseInt(btn.getAttribute('data-edit-id'), 10);
                        var row = services.find(function (x) { return x.service_id === id; });
                        if (!row) return;
                        var nextName = window.prompt('New service name', row.service_name);
                        if (nextName == null || !nextName.trim()) return;
                        fetch(API + '/services/' + id, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: nextName.trim() })
                        })
                            .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
                            .then(function (x) {
                                if (!x.ok) {
                                    alert(x.d.message || 'Update failed');
                                    return;
                                }
                                return loadServices();
                            })
                            .catch(function () { alert('Could not connect to server.'); });
                    });
                });
            }

            function loadServices() {
                return fetch(API + '/services')
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        renderTable(Array.isArray(data) ? data : []);
                    });
            }

            document.getElementById('serviceForm').addEventListener('submit', function (e) {
                e.preventDefault();
                var name = document.getElementById('serviceName').value.trim();
                var desc = document.getElementById('description').value.trim();
                var duration = document.getElementById('duration').value;
                var priority = document.getElementById('priority').value;

                document.querySelectorAll('.field-error').forEach(function (el) { el.classList.remove('visible'); });

                var ok = true;
                if (!name) {
                    document.getElementById('nameError').classList.add('visible');
                    ok = false;
                }
                if (!desc) {
                    document.getElementById('descError').classList.add('visible');
                    ok = false;
                }
                if (!duration || parseFloat(duration) < 1) {
                    document.getElementById('durationError').classList.add('visible');
                    ok = false;
                }
                if (!priority) {
                    document.getElementById('priorityError').classList.add('visible');
                    ok = false;
                }
                if (!ok) return;

                fetch(API + '/services', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        description: desc,
                        expectedDuration: Number(duration),
                        priorityLevel: priority
                    })
                })
                    .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
                    .then(function (x) {
                        if (!x.ok) {
                            alert(x.d.message || 'Could not create service');
                            return;
                        }
                        document.getElementById('serviceForm').reset();
                        return loadServices();
                    })
                    .catch(function () { alert('Could not connect to server.'); });
            });

            loadServices().catch(function () {
                document.getElementById('servicesTableBody').innerHTML =
                    '<tr><td colspan="5" style="color:#dc2626;">Could not load services.</td></tr>';
            });
        })();
    </script>
</body>
</html>

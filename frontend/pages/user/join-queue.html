<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Queue – QueueSmart</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .user-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }
        .user-nav-links { display: flex; gap: 24px; align-items: center; }
        .user-nav a { color: var(--text-secondary); text-decoration: none; font-weight: 600; font-size: 14px; transition: color var(--transition); }
        .user-nav a:hover, .user-nav a.active { color: var(--primary); }
        .user-nav .brand { font-size: 18px; font-weight: 700; color: var(--primary); }
        .user-nav .logout { color: var(--danger); cursor: pointer; }
        .join-wrapper { max-width: 600px; margin: 32px auto; padding: 0 24px; }
        .join-header { margin-bottom: 32px; }
        .join-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .join-header p { color: var(--text-secondary); font-size: 15px; }
        .service-select-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .service-select-card h2 { font-size: 18px; margin-bottom: 16px; }
        .service-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .service-option:last-child { margin-bottom: 0; }
        .service-option:hover { border-color: var(--primary); background: var(--primary-light); }
        .service-option.selected { border-color: var(--primary); background: var(--primary-light); }
        .service-option.disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        .service-option-info h3 { font-size: 16px; margin-bottom: 4px; }
        .service-option-info p { font-size: 13px; color: var(--text-muted); }
        .wait-display {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .wait-display .wait-value { font-size: 36px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
        .wait-display .wait-label { font-size: 14px; color: var(--text-muted); }
        .action-buttons { display: flex; gap: 16px; }
        .action-buttons .btn { flex: 1; }
        .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
        .btn-danger:hover { background: #b91c1c; border-color: #b91c1c; }
    </style>
</head>
<body>
    <nav class="user-nav">
        <div class="user-nav-links">
            <a href="user-dashboard.html" class="brand">QueueSmart</a>
            <a href="user-dashboard.html">Dashboard</a>
            <a href="join-queue.html" class="active">Join Queue</a>
            <a href="queue-status.html">Queue Status</a>
            <a href="notifications.html">Notifications</a>
        </div>
        <a href="login.html" class="logout" onclick="sessionStorage.removeItem('qs_user'); return true;">Logout</a>
    </nav>

    <div class="join-wrapper">
        <div class="join-header">
            <h1>Join a Queue</h1>
            <p>Select a service and join the queue</p>
        </div>

        <div class="service-select-card">
            <h2>Select a service</h2>
            <div id="serviceOptions"></div>
        </div>

        <div class="wait-display" id="waitDisplay">
            <div class="wait-value" id="waitValue">—</div>
            <div class="wait-label">Estimated wait time</div>
        </div>

        <div class="action-buttons" id="actionButtons">
            <button class="btn btn-primary" id="joinBtn" disabled>Join Queue</button>
            <button class="btn btn-danger" id="leaveBtn" style="display: none;">Leave Queue</button>
        </div>
    </div>

    <script>
        (function() {
            const API = 'http://localhost:3000/api';
            const user = JSON.parse(sessionStorage.getItem('qs_user') || '{}');
            if (!user.email) {
                window.location.href = 'login.html';
                return;
            }

            let services = [];
            let currentQueue = null;
            let selectedService = null;

            function renderOptions() {
                const container = document.getElementById('serviceOptions');
                if (services.length === 0) {
                    container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">Loading services…</p>';
                    return;
                }
                container.innerHTML = services.map(s => {
                    const isSelected = selectedService && selectedService.id === s.id;
                    const inThisQueue = currentQueue && currentQueue.serviceId === s.id;
                    const waitMin = s.expectedDuration ? s.expectedDuration + ' min' : '—';
                    return `
                        <div class="service-option ${isSelected ? 'selected' : ''}"
                             data-id="${s.id}" data-name="${s.name}" data-duration="${s.expectedDuration || 0}">
                            <div class="service-option-info">
                                <h3>${s.name}${inThisQueue ? ' (You are in this queue)' : ''}</h3>
                                <p>Est. ${waitMin} per person</p>
                            </div>
                        </div>
                    `;
                }).join('');

                container.querySelectorAll('.service-option').forEach(el => {
                    el.addEventListener('click', () => {
                        selectedService = { id: el.dataset.id, name: el.dataset.name, duration: parseInt(el.dataset.duration) || 0 };
                        renderOptions();
                        updateButtons();
                    });
                });
            }

            function updateWaitDisplay(waitTime) {
                const el = document.getElementById('waitValue');
                el.textContent = waitTime ? waitTime + ' min' : '—';
            }

            function updateButtons() {
                const joinBtn = document.getElementById('joinBtn');
                const leaveBtn = document.getElementById('leaveBtn');
                if (!selectedService) {
                    joinBtn.disabled = true;
                    joinBtn.textContent = 'Join Queue';
                    leaveBtn.style.display = 'none';
                    updateWaitDisplay(null);
                    return;
                }
                const inThisQueue = currentQueue && currentQueue.serviceId === selectedService.id;
                const inOtherQueue = currentQueue && currentQueue.serviceId !== selectedService.id;
                joinBtn.textContent = inThisQueue ? 'View Queue Status' : 'Join Queue';
                joinBtn.disabled = !!inOtherQueue;
                leaveBtn.style.display = inThisQueue ? 'block' : 'none';
                if (inThisQueue && currentQueue.waitTime) {
                    updateWaitDisplay(currentQueue.waitTime);
                } else {
                    updateWaitDisplay(null);
                }
            }

            document.getElementById('joinBtn').addEventListener('click', async () => {
                if (!selectedService) return;
                if (currentQueue && currentQueue.serviceId === selectedService.id) {
                    window.location.href = 'queue-status.html';
                    return;
                }
                if (currentQueue) return;

                const joinBtn = document.getElementById('joinBtn');
                joinBtn.disabled = true;
                joinBtn.textContent = 'Joining…';

                try {
                    const res = await fetch(API + '/queue/join', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: user.id, serviceId: selectedService.id })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        currentQueue = data.queueEntry;
                        window.location.href = 'queue-status.html';
                    } else {
                        alert(data.message || 'Could not join queue.');
                        joinBtn.disabled = false;
                        joinBtn.textContent = 'Join Queue';
                    }
                } catch (err) {
                    alert('Could not connect to server.');
                    joinBtn.disabled = false;
                    joinBtn.textContent = 'Join Queue';
                }
            });

            document.getElementById('leaveBtn').addEventListener('click', async () => {
                if (!currentQueue) return;
                if (!confirm('Leave this queue?')) return;

                try {
                    const res = await fetch(API + '/queue/leave/' + user.id, { method: 'DELETE' });
                    if (res.ok) {
                        currentQueue = null;
                        window.location.href = 'user-dashboard.html';
                    } else {
                        const data = await res.json();
                        alert(data.message || 'Could not leave queue.');
                    }
                } catch (err) {
                    alert('Could not connect to server.');
                }
            });

            async function init() {
                try {
                    const [servicesRes, statusRes] = await Promise.all([
                        fetch(API + '/services'),
                        fetch(API + '/queue/status/' + user.id)
                    ]);
                    services = await servicesRes.json();
                    if (statusRes.ok) {
                        const statusData = await statusRes.json();
                        currentQueue = statusData.queueEntry;
                        if (currentQueue) {
                            selectedService = services.find(s => s.id === currentQueue.serviceId) || null;
                            if (selectedService) selectedService = { id: selectedService.id, name: selectedService.name, duration: selectedService.expectedDuration };
                        }
                    }
                } catch (err) {
                    services = [];
                }
                renderOptions();
                updateButtons();
            }

            init();
        })();
    </script>
</body>
</html>

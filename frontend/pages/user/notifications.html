<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications – QueueSmart</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .user-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }
        .user-nav-links { display: flex; gap: 24px; align-items: center; }
        .user-nav a { color: var(--text-secondary); text-decoration: none; font-weight: 600; font-size: 14px; transition: color var(--transition); }
        .user-nav a:hover, .user-nav a.active { color: var(--primary); }
        .user-nav .brand { font-size: 18px; font-weight: 700; color: var(--primary); }
        .user-nav .logout { color: var(--danger); cursor: pointer; }
        .notif-wrapper { max-width: 700px; margin: 32px auto; padding: 0 24px; }
        .notif-header { margin-bottom: 32px; }
        .notif-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .notif-header p { color: var(--text-secondary); font-size: 15px; }
        .notif-list {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .notif-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            transition: background var(--transition);
        }
        .notif-item:last-child { border-bottom: none; }
        .notif-item:hover { background: var(--bg); }
        .notif-item.unread { background: var(--primary-light); }
        .notif-icon { font-size: 24px; flex-shrink: 0; }
        .notif-content h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
        .notif-content p { font-size: 14px; color: var(--text-secondary); margin-bottom: 4px; }
        .notif-content span { font-size: 12px; color: var(--text-muted); }
        .notif-empty {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-muted);
        }
        .notif-empty .icon { font-size: 48px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <nav class="user-nav">
        <div class="user-nav-links">
            <a href="user-dashboard.html" class="brand">QueueSmart</a>
            <a href="user-dashboard.html">Dashboard</a>
            <a href="join-queue.html">Join Queue</a>
            <a href="queue-status.html">Queue Status</a>
            <a href="notifications.html" class="active">Notifications</a>
            <a href="../../history.html">History</a>
        </div>
        <a href="../auth/login.html" class="logout" onclick="sessionStorage.removeItem('qs_user'); return true;">Logout</a>
    </nav>

    <div class="notif-wrapper">
        <div class="notif-header">
            <h1>Notifications</h1>
            <p>Your queue and service updates</p>
        </div>

        <div class="notif-list" id="notifList"></div>
    </div>

    <script src="../../js/api.js"></script>
    <script>
        (function() {
            const API = window.QS.api.getApiBase();
            const user = window.QS.api.getCurrentUser();
            if (!user.email) {
                window.location.href = '../auth/login.html';
                return;
            }

            const TYPE_ICONS = { joined: '📍', almost: '🔔', served: '✓', welcome: '🔔' };

            function formatTime(timestamp) {
                if (!timestamp) return '';
                const date = new Date(timestamp);
                const now = new Date();
                const diffMs = now - date;
                const diffMin = Math.floor(diffMs / 60000);
                if (diffMin < 1) return 'Just now';
                if (diffMin < 60) return diffMin + ' min ago';
                const diffHr = Math.floor(diffMin / 60);
                if (diffHr < 24) return diffHr + ' hr ago';
                return date.toLocaleDateString();
            }

            async function loadNotifications() {
                const list = document.getElementById('notifList');
                try {
                    const res = await fetch(API + '/notifications/' + user.id);
                    const raw = await res.json();
                    const notifications = window.QS.api.mapNotifications(Array.isArray(raw) ? raw : []);

                    if (!notifications.length) {
                        list.innerHTML = `
                            <div class="notif-empty">
                                <div class="icon">🔔</div>
                                <p>No notifications yet</p>
                            </div>
                        `;
                        return;
                    }

                    const sorted = [...notifications].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    list.innerHTML = sorted.map(n => `
                        <div class="notif-item ${n.read ? '' : 'unread'}" data-id="${n.notification_id}">
                            <span class="notif-icon">${TYPE_ICONS[n.type] || '🔔'}</span>
                            <div class="notif-content">
                                <h3>${n.type === 'joined' ? 'Queue joined' : n.type === 'almost' ? 'Almost your turn' : n.type === 'served' ? 'It\'s your turn!' : 'Notification'}</h3>
                                <p>${n.message || ''}</p>
                                <span>${formatTime(n.timestamp)}</span>
                            </div>
                        </div>
                    `).join('');

                    sorted.filter(n => !n.read).forEach(n => {
                        fetch(API + '/notifications/' + n.notification_id + '/read', { method: 'PUT' });
                    });
                } catch (err) {
                    list.innerHTML = '<p style="color:var(--text-muted);padding:20px;">Could not load notifications.</p>';
                }
            }

            loadNotifications();
        })();
    </script>
</body>
</html>

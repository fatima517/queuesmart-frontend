services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: queuesmart_root
      MYSQL_DATABASE: queuesmart
    ports:
      - "3306:3306"
    volumes:
      - queuesmart_mysql_data:/var/lib/mysql
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./src/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pqueuesmart_root"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 15s

volumes:
  queuesmart_mysql_data:
